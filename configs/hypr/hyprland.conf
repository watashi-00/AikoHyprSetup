# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua
#programs
$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun

#binds
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, $HOME/.config/waybar/power-menu.sh
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $HOME/.config/waybar/launcher.sh
bind = $mainMod, Y, exec, $HOME/.config/waybar/clipboard-history.sh
bind = $mainMod, F, fullscreen, toggle
bind = $mainMod, P, exec, playerctl play-pause
bind = $mainMod, Z, exec, pavucontrol
bind = $mainMod, T, exec, $HOME/.config/waybar/widgets/aiko-clock/aiko-clock.sh
bind = $mainMod, W, exec, $HOME/.config/waybar/widgets/aiko-weather/aiko-weather.sh
bind = $mainMod, U, exec, $HOME/.config/waybar/widgets/aiko-usercard/aiko-usercard.sh
bind = $mainMod, F1, exec, kitty --class Shortcuts -e bash -lc 'clear; cat $HOME/.config/hypr/shortcuts.txt; echo; read -n 1 -s'
bind = $mainMod, F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = $mainMod, F3, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
# Alt+Tab to cycle through windows
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,

#printScreen
bind = , PRINT, exec, $HOME/.config/waybar/screenshot.sh menu
bind = $mainMod, PRINT, exec, $HOME/.config/waybar/screenshot.sh area
bind = $mainMod SHIFT, PRINT, exec, $HOME/.config/waybar/screenshot.sh picker

#move mouse
bindm = $mainMod, mouse:272, movewindow
#resize mouse
bindm = $mainMod, mouse:273, resizewindow

#monitors
# Leave the output blank so Hyprland can apply this to any monitor that appears.
# New displays will use their preferred mode and be placed automatically.
monitor = , preferred, auto, 1

#keyboard
input {
    kb_layout = br
    touchpad {
        natural_scroll = no
        tap-to-click = true
    }
}

#autostart
exec-once = waybar --config $HOME/.config/waybar/config-left.jsonc --style $HOME/.config/waybar/style.css
exec-once = waybar --config $HOME/.config/waybar/config.jsonc --style $HOME/.config/waybar/style.css
exec-once = waybar --config $HOME/.config/waybar/config-bottom.jsonc --style $HOME/.config/waybar/style.css
exec-once = nm-applet
exec-once = /usr/lib/polkit-kde-agent-1
exec-once = $HOME/.config/waybar/wallpaper.sh apply
exec-once = $HOME/.config/waybar/clipboard-listener.sh

# Window rules for widgets and floaters (Unified syntax for 0.55+)
windowrule = match:class ^(aiko-note)$, float on
windowrule = match:class ^(aiko-note)$, center on
windowrule = match:class ^(aiko-note)$, pin on

windowrule = match:class ^(aiko-clock)$, float on
windowrule = match:class ^(aiko-clock)$, size 300 150
windowrule = match:class ^(aiko-clock)$, move 1580 50

windowrule = match:class ^(aiko-weather)$, float on
windowrule = match:class ^(aiko-weather)$, size 280 400
windowrule = match:class ^(aiko-weather)$, move 1580 220

windowrule = match:class ^(kitty)$, float on
windowrule = match:class ^(kitty)$, size 1200 600
windowrule = match:class ^(kitty)$, center on

#layout
general {
    gaps_in = 8 # @theme:gaps_in
    gaps_out = 15 # @theme:gaps_out
    border_size = 2
    col.active_border = rgba(f5c2e7ff) rgba(cba6f7ff) 45deg # @theme:active_border
    col.inactive_border = rgba(313244aa) # @theme:inactive_border
}

#visuals
decoration {
    rounding = 15 # @theme:rounding
    active_opacity = 1.0 # @theme:active_opacity
    inactive_opacity = 0.9 # @theme:inactive_opacity
    blur {
        enabled = true
        size = 3
        passes = 2
    }
}

# Minimization support using special workspace
bind = $mainMod, Down, exec, $HOME/.config/waybar/minimize.sh minimize
bind = $mainMod, Up, exec, $HOME/.config/waybar/minimize.sh restore
