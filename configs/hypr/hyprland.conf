# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua
#programs
$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun

#binds
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, aiko --power
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, aiko --launcher
bind = $mainMod, D, exec, aiko --search
bind = $mainMod, B, exec, aiko --bluetooth
bind = $mainMod, Y, exec, aiko --clip
bind = $mainMod, F, fullscreen, toggle
bind = $mainMod, P, exec, playerctl play-pause
bind = $mainMod, Z, exec, pavucontrol
bind = $mainMod, T, exec, aiko --clock
bind = $mainMod, W, exec, aiko --weather
bind = $mainMod, U, exec, aiko --usercard
bind = $mainMod, N, exec, aiko --player
bind = $mainMod SHIFT, T, exec, aiko --calendar
bind = $mainMod, K, exec, aiko --timer
bind = $mainMod SHIFT, R, exec, aiko --recorder
bind = $mainMod, F1, exec, kitty --class Shortcuts -e bash -lc 'clear; cat $HOME/.config/hypr/shortcuts.txt; echo; read -n 1 -s'
bind = $mainMod, F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = $mainMod, F3, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
# Alt+Tab to cycle through windows
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,

#printScreen
bind = , PRINT, exec, aiko --screenshot menu
bind = $mainMod, PRINT, exec, aiko --screenshot area
bind = $mainMod SHIFT, PRINT, exec, aiko --screenshot picker

#move mouse
bindm = $mainMod, mouse:272, movewindow
#resize mouse
bindm = $mainMod, mouse:273, resizewindow

#monitors
# Leave the output blank so Hyprland can apply this to any monitor that appears.
# New displays will use their preferred mode and be placed automatically.
monitor = , preferred, auto, 1

#keyboard
input {
    kb_layout = br
    touchpad {
        natural_scroll = no
        tap-to-click = true
    }
}

#autostart
exec-once = waybar --config $HOME/.config/waybar/active_layout/config-left.jsonc --style $HOME/.config/waybar/style.css
exec-once = sleep 0.2 && waybar --config $HOME/.config/waybar/active_layout/config-bottom.jsonc --style $HOME/.config/waybar/style.css
exec-once = sleep 0.4 && waybar --config $HOME/.config/waybar/active_layout/config.jsonc --style $HOME/.config/waybar/style.css
exec-once = nm-applet
exec-once = /usr/lib/polkit-kde-agent-1
exec-once = sleep 1 && aiko --wallpaper apply
exec-once = aiko --event-listener  # I should add this too

# Window rules for widgets and floaters (Unified syntax for 0.55+)
windowrule = match:class ^(aiko-note.*)$, float on
windowrule = match:class ^(aiko-note.*)$, center on
windowrule = match:class ^(aiko-note.*)$, pin on

windowrule = match:class ^(aiko-clock.*)$, float on
windowrule = match:class ^(aiko-clock.*)$, size 300 150
windowrule = match:class ^(aiko-clock.*)$, move 1580 50

windowrule = match:class ^(aiko-weather.*)$, float on
windowrule = match:class ^(aiko-weather.*)$, size 280 400
windowrule = match:class ^(aiko-weather.*)$, move 1580 220

windowrule = match:class ^(aiko-player.*)$, float on
windowrule = match:class ^(aiko-player.*)$, size 500 300
windowrule = match:class ^(aiko-player.*)$, center on

windowrule = match:class ^(aiko-usercard.*)$, float on
windowrule = match:class ^(aiko-usercard.*)$, center on

windowrule = match:class ^(aiko-sys.*)$, float on
windowrule = match:class ^(aiko-sys.*)$, center on

windowrule = match:class ^(aiko-audio.*)$, float on
windowrule = match:class ^(aiko-audio.*)$, center on

windowrule = match:class ^(aiko-bluetooth.*)$, float on
windowrule = match:class ^(aiko-bluetooth.*)$, size 360 420
windowrule = match:class ^(aiko-bluetooth.*)$, center on

windowrule = match:class ^(aiko-list.*)$, float on
windowrule = match:class ^(aiko-list.*)$, center on

windowrule = match:class ^(aiko-calendar.*)$, float on
windowrule = match:class ^(aiko-calendar.*)$, center on

windowrule = match:class ^(aiko-timer.*)$, float on
windowrule = match:class ^(aiko-timer.*)$, center on

windowrule = match:class ^(aiko-recorder.*)$, float on
windowrule = match:class ^(aiko-recorder.*)$, center on

windowrule = match:class ^(aiko-wallpaper.*)$, float on
windowrule = match:class ^(aiko-wallpaper.*)$, center on

windowrule = match:class ^(kitty)$, float on
windowrule = match:class ^(kitty)$, size 1200 600
windowrule = match:class ^(kitty)$, center on

#layout
general {
    gaps_in = 8 # @theme:hypr-gaps-in
    gaps_out = 15 # @theme:hypr-gaps-out
    border_size = 2
    col.active_border = rgba(f5c2e7ff) rgba(cba6f7ff) 45deg # @theme:hypr-active-border
    col.inactive_border = rgba(313244aa) # @theme:hypr-inactive-border
}

#visuals
decoration {
    rounding = 15 # @theme:hypr-rounding
    active_opacity = 1.0 # @theme:hypr-active-opacity
    inactive_opacity = 0.9 # @theme:hypr-inactive-opacity
    blur {
        enabled = true
        size = 3
        passes = 2
    }
}

# Minimization support using special workspace
bind = $mainMod, down, exec, aiko --minimize minimize
bind = $mainMod, up, exec, aiko --minimize restore

# Layer and window rules for glassmorphism blurs
layerrule = blur, waybar
layerrule = blur, wofi
windowrule = match:class ^(aiko-.*)$, blur on
windowrule = match:class ^(aiko-.*)$, opacity 0.95



