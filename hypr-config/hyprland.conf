# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua
#programs
$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun

#binds
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, ~/.config/waybar/launcher.sh
bind = $mainMod, Y, exec, ~/.config/waybar/clipboard-history.sh
bind = $mainMod, F, fullscreen, toggle
bind = $mainMod, P, exec, playerctl play-pause
bind = $mainMod, Z, exec, pavucontrol
bind = $mainMod, F1, exec, kitty --class Shortcuts -e bash -lc 'clear; cat ~/.config/hypr/shortcuts.txt; echo; read -n 1 -s'
bind = $mainMod, F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = $mainMod, F3, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
# Alt+Tab to cycle through windows
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,

#printScreen
bind = , PRINT, exec, ~/.config/waybar/screenshot.sh menu
bind = $mainMod, PRINT, exec, ~/.config/waybar/screenshot.sh area
bind = $mainMod SHIFT, PRINT, exec, ~/.config/waybar/screenshot.sh picker

#move mouse
bindm = $mainMod, mouse:272, movewindow
#resize mouse
bindm = $mainMod, mouse:273, resizewindow

#monitors
monitor = eDP-1, preferred, auto, 1
monitor = HDMI-A-1, highrr, auto, 1

#abnt
input {
    kb_layout = br
    touchpad {
        natural_scroll = no
        tap-to-click = true
    }
}

#autostart
exec-once = waybar --config ~/.config/waybar/config-left.jsonc --style ~/.config/waybar/style.css
exec-once = waybar --config ~/.config/waybar/config.jsonc --style ~/.config/waybar/style.css
exec-once = waybar --config ~/.config/waybar/config-bottom.jsonc --style ~/.config/waybar/style.css
exec-once = nm-applet
exec-once = /usr/lib/polkit-kde-agent-1
exec-once = hyprpaper
exec-once = ~/.config/hypr/clipboard-listener.sh

# Window rules for widgets and floaters
# windowrule = float:true,app:pavucontrol  # invalid legacy syntax on this version

#layout
general {
    gaps_in = 8
    gaps_out = 15
    border_size = 2
    col.active_border = rgba(f5c2e7ff) rgba(cba6f7ff) 45deg
    col.inactive_border = rgba(313244aa)
}

#visuals
decoration {
    rounding = 15
    active_opacity = 1.0
    inactive_opacity = 0.9
    blur {
        enabled = true
        size = 3
        passes = 2
    }
}

# Minimization support using special workspace
bind = $mainMod, Down, exec, ~/.config/waybar/minimize.sh minimize
bind = $mainMod, Up, exec, ~/.config/waybar/minimize.sh restore
