name: Build and Package

on:
  push:
    branches:
      - master
      - main
      - test
  pull_request:
    branches:
      - master
      - main
      - test

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Bash Syntax Check
        run: find . -type f -name "*.sh" -not -path "*/.git/*" -exec bash -n {} +

      - name: Run Python Syntax Check
        run: |
          sudo apt-get update
          sudo apt-get install -y python3
          find . -type f -name "*.py" -not -path "*/.git/*" -exec python3 -m py_compile {} +

      - name: Package Build Archive
        run: |
          sudo apt-get update
          sudo apt-get install -y zip tar xz-utils
          mkdir -p build/AikoHyprSetup
          cp -a configs scripts themes waybar widgets assets install.sh README.md LICENSE build/AikoHyprSetup/
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          cd build
          tar -czvf "AikoHyprSetup-${SHORT_SHA}.tar.gz" AikoHyprSetup/
          tar -cJvf "AikoHyprSetup-${SHORT_SHA}.tar.xz" AikoHyprSetup/
          zip -r "AikoHyprSetup-${SHORT_SHA}.zip" AikoHyprSetup/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AikoHyprSetup-Builds-${{ env.SHORT_SHA }}
          path: |
            build/*.tar.gz
            build/*.tar.xz
            build/*.zip
          retention-days: 14