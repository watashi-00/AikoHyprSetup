name: Release Build

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Build Archive
        run: |
          sudo apt-get update
          sudo apt-get install -y zip tar xz-utils
          mkdir -p build/AikoHyprSetup
          
          # Copy all essential files to build directory
          cp -a configs scripts themes waybar widgets assets install.sh README.md LICENSE build/AikoHyprSetup/
          
          # Get Version from the new centralized utility library
          VERSION=$(grep '^export AIKO_VERSION=' scripts/lib/utils.sh | cut -d '"' -f 2)
          if [ -z "$VERSION" ]; then
            VERSION="v$(date +'%Y%m%d%H%M')"
          fi
          echo "AIKO_VERSION=${VERSION}" >> $GITHUB_ENV
          
          cd build
          tar -czvf "AikoHyprSetup-${VERSION}.tar.gz" AikoHyprSetup/
          tar -cJvf "AikoHyprSetup-${VERSION}.tar.xz" AikoHyprSetup/
          zip -r "AikoHyprSetup-${VERSION}.zip" AikoHyprSetup/

      - name: Determine Release Body
        id: release_body
        run: |
          EXISTING_BODY=$(gh release view "v${{ env.AIKO_VERSION }}" --json body -q .body 2>/dev/null || true)
          if [ -n "$EXISTING_BODY" ] && ! echo "$EXISTING_BODY" | grep -q "Automated release generated from master branch"; then
            echo "Preserving existing custom release notes."
            echo "$EXISTING_BODY" > release_notes.md
          else
            echo "Using default automated release notes."
            echo -e "Automated release generated from master branch.\nVersion: ${{ env.AIKO_VERSION }}" > release_notes.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.AIKO_VERSION }}
          name: AikoHyprSetup v${{ env.AIKO_VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            build/*.tar.gz
            build/*.tar.xz
            build/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
