name: Build and Package

on:
  push:
    branches:
      - master
      - main
      - test
  pull_request:
    branches:
      - master
      - main
      - test

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Bash Syntax Check
        run: find . -type f -name "*.sh" -not -path "*/.git/*" -exec bash -n {} +

      - name: Run Python Syntax Check
        run: |
          sudo apt-get update
          sudo apt-get install -y python3
          find . -type f -name "*.py" -not -path "*/.git/*" -exec python3 -m py_compile {} +

      - name: Package Build Archive
        run: |
          # Install zip utility
          sudo apt-get install -y zip
          
          # Create a directory for the release package
          mkdir -p build/AikoHyprSetup
          
          # Copy all necessary directories and files, preserving symlinks
          cp -a configs scripts themes waybar widgets assets install.sh README.md LICENSE build/AikoHyprSetup/ 2>/dev/null || true
          
          # Get a short version of the commit SHA for versioning
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          # Create multiple archive formats
          cd build
          tar -czvf AikoHyprSetup-${SHORT_SHA}.tar.gz AikoHyprSetup/
          tar -cJvf AikoHyprSetup-${SHORT_SHA}.tar.xz AikoHyprSetup/
          zip -r AikoHyprSetup-${SHORT_SHA}.zip AikoHyprSetup/
          
          # Export the base artifact name to an environment variable
          echo "artifact_name_base=AikoHyprSetup-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AikoHyprSetup-Builds
          path: |
            build/${{ env.artifact_name_base }}.tar.gz
            build/${{ env.artifact_name_base }}.tar.xz
            build/${{ env.artifact_name_base }}.zip
          retention-days: 14